<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Oceanus | Fleet Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>Project Oceanus Console</h1>
            <p>Developer: Jai Verma</p>
        </header>

        <main>
            <section class="control-panel">
                <h2>Deploy New Ship</h2>
                <form id="fleet-form">
                    <input type="text" id="ship_name" placeholder="Vessel Name" required>
                    <select id="ship_class" required>
                        <option value="" disabled selected>Select Class</option>
                        <option value="Explorer">Explorer</option>
                        <option value="Cargo">Cargo</option>
                        <option value="Frigate">Frigate</option>
                    </select>
                    <button type="submit">Deploy to Fleet</button>
                </form>
            </section>

            <section class="fleet-status">
                <h2>Active Fleet</h2>
                <table id="fleet-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Vessel Name</th>
                            <th>Class</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="fleet-data">
                        </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
